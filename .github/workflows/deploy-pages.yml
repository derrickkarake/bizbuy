name: Deploy report to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install minimal deps
        run: npm install --no-audit --no-fund tsx@^4 @types/node@^20

      - name: Regenerate report from CSV
        run: npx tsx scripts/build-report.ts

      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          mkdir -p _site/data
          cp data/shortlist-v2.csv _site/data/shortlist-v2.csv
          cp data/report.html _site/data/report.html
          cp data/report.md _site/data/report.md

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
